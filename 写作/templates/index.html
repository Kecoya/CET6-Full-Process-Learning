<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✍️ CET-6 写作</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>✍️ CET-6 写作</h1>
            <div class="header-info">出题 → 限时写作 → AI 评分（14 档）→ 对照范文与高级表达</div>
        </header>

        <div class="card">
            <h2>⚙️ 基础设置</h2>
            <div id="statusBanner" class="status-banner">
                <span id="statusBackend">🔌 后端：检测中…</span>
                <span id="statusKey">🔑 DeepSeek Key：检测中…</span>
                <span id="statusHint" class="hint" style="margin:0"></span>
            </div>
            <div style="margin-top:14px">
                <label style="font-size:13px;color:#555;display:flex;align-items:center;gap:8px;cursor:pointer">
                    <input type="checkbox" id="vocabChk" checked> 📚 词汇合规：生成后按「四六级大纲词表」扫描并替换超纲词
                </label>
            </div>
            <div class="row" style="margin-top:14px">
                <div class="col-fixed" style="min-width:240px">
                    <label class="field-label">🧠 模型（留空则使用 .env 默认值）</label>
                    <select id="modelSelect">
                        <option value="" selected>使用 .env 默认</option>
                        <option value="deepseek-v4-flash">deepseek-v4-flash（快·省）</option>
                        <option value="deepseek-v4-pro">deepseek-v4-pro（评分更细腻）</option>
                    </select>
                </div>
                <div class="col-fixed" style="min-width:160px">
                    <label class="field-label">⏱️ 倒计时（分钟）</label>
                    <input type="number" id="timerMinutes" value="30" min="1" max="120" step="1">
                </div>
                <div class="col-fixed" style="min-width:200px;padding-bottom:4px">
                    <label class="field-label">严格模式</label>
                    <label style="font-size:13px;color:#555;display:flex;align-items:center;gap:8px;cursor:pointer">
                        <input type="checkbox" id="strictChk"> 到点自动收卷
                    </label>
                </div>
            </div>
        </div>

        <div class="card" style="padding:16px 22px"><div class="stepper" id="stepper"></div></div>

        <div class="card" id="stage-source">
            <h2>✨ 出题</h2>
            <label class="field-label">主题 / 方向（可选，留空则从四类真题模板随机）</label>
            <input type="text" id="topicInput" placeholder="例如：the importance of teamwork / a saying / digital literacy" />
            <div class="hint">AI 将生成 Directions 题干 + 150–200 词范文 + 中文提纲 + 高级表达。</div>
            <div style="margin-top:16px">
                <button class="btn btn-primary" onclick="generateExercise()">✨ 生成写作题</button>
            </div>
        </div>

        <div class="card hidden" id="stage-answer">
            <div class="section-head">
                <div class="left"><h2 style="margin:0">✍️ 写作</h2><span class="badge" id="ansBadge"></span></div>
            </div>
            <div class="timer-bar">
                <span class="timer-label">⏱️ 剩余时间</span>
                <span class="timer-display" id="timerDisplay">30:00</span>
                <button class="btn btn-ghost btn-sm" id="pauseBtn" onclick="togglePauseTimer()">⏸️ 暂停</button>
                <button class="btn btn-ghost btn-sm" onclick="resetTimer()">🔄 重置</button>
            </div>
            <div id="promptBox"></div>
            <div class="write-toolbar">
                <label class="field-label" style="margin:0">你的作文（目标 150–200 词）</label>
                <span class="word-counter" id="wordCounter">0 词</span>
            </div>
            <textarea class="write-area" id="answerInput" placeholder="Write your essay here..." oninput="updateWordCount()"></textarea>
            <div style="margin-top:18px;text-align:center">
                <button class="btn btn-orange" id="scoreBtn" onclick="submitScore()">📊 提交并 AI 评分</button>
            </div>
        </div>

        <div class="card hidden" id="stage-score">
            <h2>📊 AI 评分</h2>
            <div id="scoreContent"></div>
            <div id="referenceContent"></div>
            <div style="margin-top:20px;text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
                <button class="btn btn-green" onclick="saveExercise()">💾 保存到 my/</button>
                <button class="btn btn-ghost" onclick="restart()">🔄 再来一篇</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="ltext" id="loadingText">AI 思考中…</div>
    </div>
    <script src="/static/app.js" defer></script>
</body>
</html>
