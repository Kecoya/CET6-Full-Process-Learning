<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📄 CET-6 长篇阅读</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📄 CET-6 长篇阅读</h1>
            <div class="header-info">出题 → 限时查读匹配 → 本地评分解析（Section B · 10 陈述句匹配段落）</div>
        </header>

        <div class="card">
            <h2>⚙️ 基础设置</h2>
            <div id="statusBanner" class="status-banner">
                <span id="statusBackend">🔌 后端：检测中…</span>
                <span id="statusKey">🔑 DeepSeek Key：检测中…</span>
                <span id="statusHint" class="hint" style="margin:0"></span>
            </div>
            <div class="row" style="margin-top:14px">
                <div class="col-fixed" style="min-width:240px">
                    <label class="field-label">🧠 模型（留空则使用 .env 默认值）</label>
                    <select id="modelSelect">
                        <option value="" selected>使用 .env 默认</option>
                        <option value="deepseek-v4-flash">deepseek-v4-flash（快·省）</option>
                        <option value="deepseek-v4-pro">deepseek-v4-pro（质量更佳）</option>
                    </select>
                </div>
                <div class="col-fixed" style="min-width:160px">
                    <label class="field-label">⏱️ 倒计时（分钟）</label>
                    <input type="number" id="timerMinutes" value="15" min="1" max="120" step="1">
                </div>
                <div class="col-fixed" style="min-width:200px;padding-bottom:4px">
                    <label class="field-label">严格模式</label>
                    <label style="font-size:13px;color:#555;display:flex;align-items:center;gap:8px;cursor:pointer">
                        <input type="checkbox" id="strictChk"> 到点自动收卷
                    </label>
                </div>
            </div>
        </div>

        <div class="card" style="padding:16px 22px"><div class="stepper" id="stepper"></div></div>

        <div class="card" id="stage-source">
            <h2>✨ 出题</h2>
            <label class="field-label">主题 / 关键词（可选，留空则随机）</label>
            <input type="text" id="topicInput" placeholder="例如：online retail / protein / digital privacy" />
            <div class="hint">AI 将生成约 1200 词、10–14 段原文 + 10 条陈述句（每条对应一个段落）。</div>
            <div style="margin-top:16px">
                <button class="btn btn-primary" onclick="generateExercise()">✨ 生成长篇阅读题</button>
            </div>
        </div>

        <div class="card hidden" id="stage-answer">
            <div class="section-head">
                <div class="left"><h2 style="margin:0">✍️ 查读并匹配</h2><span class="badge" id="ansBadge"></span></div>
            </div>
            <div class="timer-bar">
                <span class="timer-label">⏱️ 剩余时间</span>
                <span class="timer-display" id="timerDisplay">15:00</span>
                <button class="btn btn-ghost btn-sm" id="pauseBtn" onclick="togglePauseTimer()">⏸️ 暂停</button>
                <button class="btn btn-ghost btn-sm" onclick="resetTimer()">🔄 重置</button>
            </div>
            <div class="hint" style="margin-bottom:10px">💡 用略读/查读在左栏定位，为右栏每条陈述句选择对应段落字母。同一段落可对应多条。</div>
            <div class="match-layout">
                <div class="match-passage" id="passageBox"></div>
                <div class="match-statements" id="statementsBox"></div>
            </div>
            <div style="margin-top:18px;text-align:center">
                <div class="hint" style="margin-bottom:10px">已匹配 <span id="answeredCount">0</span> / <span id="totalQ">10</span> 句</div>
                <button class="btn btn-orange" id="scoreBtn" onclick="submitScore()" disabled>📊 提交并评分</button>
            </div>
        </div>

        <div class="card hidden" id="stage-score">
            <h2>📊 评分与解析</h2>
            <div id="scoreContent"></div>
            <div id="reviewContent"></div>
            <div style="margin-top:20px;text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
                <button class="btn btn-green" onclick="saveExercise()">💾 保存到 my/</button>
                <button class="btn btn-ghost" onclick="restart()">🔄 再来一篇</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="ltext" id="loadingText">AI 思考中…</div>
    </div>
    <script src="/static/app.js" defer></script>
</body>
</html>
